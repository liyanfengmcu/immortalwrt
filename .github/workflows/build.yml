# ImmortalWrt 云编译工作流
# 目标设备: 9tripod_x3568-v4 (RK3568)

name: ImmortalWrt Cloud Build

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt 版本分支'
        required: true
        default: 'openwrt-23.05'
        type: choice
        options:
          - openwrt-23.05
          - main
          - openwrt-21.02
      cpu_count:
        description: '编译线程数 (默认使用全部核心)'
        required: false
        default: 'auto'
        type: string
      custom_packages:
        description: '额外安装的软件包 (空格分隔)'
        required: false
        default: 'luci-app-upnp luci-app-ttyd'
        type: string

env:
  IMMORTALWRT_VERSION: ${{ github.event.inputs.immortalwrt_version || 'openwrt-23.05' }}
  TARGET: rockchip
  SUBTARGET: armv8
  DEVICE: 9tripod_x3568-v4

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    
    steps:
      - name: 初始化编译环境
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang flex g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            python3-dev python3-pyelftools python3-distutils-extra

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone -b $IMMORTALWRT_VERSION --single-branch --depth=1 \
            https://github.com/immortalwrt/immortalwrt.git immortalwrt
          cd immortalwrt
          git log -1

      - name: 更新 Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置文件
        run: |
          cd immortalwrt
          cat > .config << EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${DEVICE}=y

          # 镜像配置
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256
          CONFIG_TARGET_IMAGES_GZIP=y

          # 镜像输出格式
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_EXT4_MAXINODE=60000

          # 基础软件包
          CONFIG_PACKAGE_default-settings=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-base=y
          CONFIG_PACKAGE_luci-lib-nixio=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-material=y

          # 中文支持
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          # 常用工具
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_automount=y
          # CONFIG_PACKAGE_autosamba=y  # 需要额外 feeds 支持
          CONFIG_PACKAGE_ipv6-helper=y
          CONFIG_PACKAGE_wireless-tools=y

          # 网络工具
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y

          EOF

          # 添加用户自定义软件包
          if [ -n "${{ github.event.inputs.custom_packages }}" ]; then
            for pkg in ${{ github.event.inputs.custom_packages }}; do
              echo "CONFIG_PACKAGE_${pkg}=y" >> .config
            done
          fi

      - name: 显示完整配置
        run: |
          cd immortalwrt
          echo "=========================================="
          echo "    完整 .config 配置文件内容"
          echo "=========================================="
          echo ""
          cat .config
          echo ""
          echo "=========================================="
          echo "    配置统计信息"
          echo "=========================================="
          echo "总配置项数量: $(wc -l < .config)"
          echo "启用的软件包数量: $(grep -c "^CONFIG_PACKAGE.*=y" .config || echo 0)"
          echo "禁用的配置项数量: $(grep -c "^# CONFIG_" .config || echo 0)"
          echo ""
          echo "### 配置文件已显示完成 ###"

      - name: 下载依赖包
        run: |
          cd immortalwrt
          make defconfig
          JOBS=$(nproc)
          echo "使用 ${JOBS} 线程下载"
          # 使用简洁模式下载,仅输出错误和摘要
          make download -j${JOBS} 2>&1 | grep -E "^(Downloading|ERROR|FAILED|make\[)" || true
          echo "下载完成"

      - name: 开始编译
        run: |
          cd immortalwrt
          # 减少编译线程数避免内存不足
          JOBS=$(($(nproc)/2))
          if [ $JOBS -lt 1 ]; then JOBS=1; fi
          echo "使用 ${JOBS} 线程编译 (原CPU核心数: $(nproc))"
          
          # 使用默认输出级别,仅在失败时保存完整日志
          if make -j${JOBS} 2>&1 | tee compile.log; then
            echo "✅ 编译成功完成"
          else
            COMPILE_EXIT=$?
            echo "::error::编译失败，退出码: $COMPILE_EXIT"
            echo ""
            echo "=== 错误摘要 (最后50行) ==="
            tail -50 compile.log
            echo ""
            echo "完整日志已保存到 artifact"
            exit $COMPILE_EXIT
          fi

      - name: 整理固件文件
        run: |
          cd immortalwrt
          mkdir -p firmware
          # 只复制文件,不复制 packages 目录
          find bin/targets/${TARGET}/${SUBTARGET} -maxdepth 1 -type f -exec cp {} firmware/ \;
          cd firmware
          # 只对文件计算哈希,排除目录
          find . -type f ! -name "sha256sums.txt" -exec sha256sum {} + > sha256sums.txt
          echo "## 编译信息" >> $GITHUB_STEP_SUMMARY
          echo "- **设备**: ${DEVICE}" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${IMMORTALWRT_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **编译时间**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 固件文件列表" >> $GITHUB_STEP_SUMMARY
          ls -lh >> $GITHUB_STEP_SUMMARY

      - name: 生成 rkdeveloptool 刷机文件
        run: |
          cd immortalwrt
          mkdir -p rkflash
          
          # 查找 sysupgrade.img 文件
          IMG_FILE=$(find bin/targets/${TARGET}/${SUBTARGET} -name "*sysupgrade.img*" | head -1)
          
          if [ -n "$IMG_FILE" ]; then
            # 解压 gz 文件（如果是压缩的）
            if [[ "$IMG_FILE" == *.gz ]]; then
              gunzip -k "$IMG_FILE"
              IMG_FILE="${IMG_FILE%.gz}"
            fi
            
            # 复制完整镜像
            cp "$IMG_FILE" rkflash/openwrt.img
            
            # 使用 losetup 挂载镜像并提取分区
            LOOP_DEV=$(sudo losetup -fP --show "$IMG_FILE")
            sudo partprobe $LOOP_DEV
            
            # 提取各分区
            mkdir -p rkflash/partitions
            
            # 列出分区信息
            echo "=== 分区信息 ===" 
            sudo fdisk -l "$IMG_FILE"
            
            # 提取分区
            for part in ${LOOP_DEV}p*; do
              if [ -e "$part" ]; then
                part_name=$(basename $part)
                part_num=$(echo $part_name | sed 's/.*p//')
                echo "提取分区: $part_name"
                sudo dd if=$part of=rkflash/partitions/partition_${part_num}.img bs=4M status=progress
              fi
            done
            
            # 卸载
            sudo losetup -d $LOOP_DEV
            
            # 复制 bootloader 文件（如果存在）
            if [ -d "bin/targets/${TARGET}/${SUBTARGET}/" ]; then
              find bin/targets/${TARGET}/${SUBTARGET} -name "idbloader*" -exec cp {} rkflash/ \;
              find bin/targets/${TARGET}/${SUBTARGET} -name "u-boot*" -exec cp {} rkflash/ \;
            fi
          fi
          
          # 创建 rkdeveloptool 刷机脚本
          cat > rkflash/flash.sh << 'FLASH_SCRIPT'
          #!/bin/bash
          # rkdeveloptool 刷机脚本
          # 使用方法: sudo ./flash.sh [openwrt.img]
          
          set -e
          
          IMG_FILE="${1:-openwrt.img}"
          
          if [ ! -f "$IMG_FILE" ]; then
            echo "错误: 找不到固件文件 $IMG_FILE"
            exit 1
          fi
          
          echo "=== rkdeveloptool 刷机工具 ==="
          echo "固件文件: $IMG_FILE"
          echo ""
          
          # 检查设备连接
          echo "检测设备..."
          rkdeveloptool ld
          
          echo ""
          echo "重要提示:"
          echo "1. 确保设备已进入 Mask ROM 模式"
          echo "2. 按住 RECOVERY 按钮并连接 USB"
          echo "3. 或按住 RECOVERY + RESET 按钮"
          echo ""
          read -p "按回车继续刷机..."
          
          # 下载 bootloader
          echo "下载 bootloader..."
          rkdeveloptool db rk356x_loader_v1.15.125.bin
          
          # 写入完整镜像
          echo "写入固件..."
          rkdeveloptool wl 0 "$IMG_FILE"
          
          # 重启设备
          echo "重启设备..."
          rkdeveloptool rd
          
          echo "刷机完成!"
          FLASH_SCRIPT
          
          chmod +x rkflash/flash.sh
          
          # 创建 Windows 刷机批处理
          cat > rkflash/flash.bat << 'FLASH_BAT'
          @echo off
          REM rkdeveloptool 刷机脚本 (Windows)
          REM 使用方法: flash.bat openwrt.img
          
          set IMG_FILE=%1
          if "%IMG_FILE%"=="" set IMG_FILE=openwrt.img
          
          echo === rkdeveloptool 刷机工具 ===
          echo 固件文件: %IMG_FILE%
          echo.
          
          REM 检查设备
          echo 检测设备...
          rkdeveloptool ld
          
          echo.
          echo 重要提示:
          echo 1. 确保设备已进入 Mask ROM 模式
          echo 2. 按住 RECOVERY 按钮并连接 USB
          echo.
          pause
          
          REM 下载 bootloader
          echo 下载 bootloader...
          rkdeveloptool db rk356x_loader_v1.15.125.bin
          
          REM 写入固件
          echo 写入固件...
          rkdeveloptool wl 0 %IMG_FILE%
          
          REM 重启
          echo 重启设备...
          rkdeveloptool rd
          
          echo 刷机完成!
          pause
          FLASH_BAT
          
          # 创建分区单独刷机脚本
          cat > rkflash/flash_partitions.sh << 'PART_SCRIPT'
          #!/bin/bash
          # 分区单独刷机脚本
          # 适用于需要单独更新某个分区的场景
          
          echo "=== 分区刷机工具 ==="
          echo "可用操作:"
          echo "  1) 写入完整镜像"
          echo "  2) 仅更新 boot 分区"
          echo "  3) 仅更新 rootfs 分区"
          echo "  4) 重启设备"
          echo ""
          read -p "选择操作 [1-4]: " choice
          
          case $choice in
            1)
              rkdeveloptool wl 0 openwrt.img
              ;;
            2)
              # boot 分区通常在扇区 32768 (16MB偏移)
              rkdeveloptool wl 64 partitions/partition_1.img
              ;;
            3)
              # rootfs 分区通常在扇区 229376 (112MB偏移)
              rkdeveloptool wl 45056 partitions/partition_2.img
              ;;
            4)
              rkdeveloptool rd
              ;;
            *)
              echo "无效选择"
              ;;
          esac
          PART_SCRIPT
          
          chmod +x rkflash/flash_partitions.sh
          
          # 下载 RK356x bootloader
          echo "下载 RK356x bootloader..."
          curl -fsSL "https://github.com/nickswalker/rk3568-toolchain/raw/main/rk356x_loader_v1.15.125.bin" -o rkflash/rk356x_loader_v1.15.125.bin || \
          curl -fsSL "https://dl.google.com/adb/rk356x_loader_v1.15.125.bin" -o rkflash/rk356x_loader_v1.15.125.bin || \
          echo "警告: 无法下载 bootloader，请手动下载"
          
          # 生成说明文件
          cat > rkflash/README.txt << 'README'
          ===================================
             rkdeveloptool 刷机说明
          ===================================
          
          一、准备工作
          ------------
          1. 下载 rkdeveloptool:
             Linux: apt install rkdeveloptool
             Windows: https://github.com/nickswalker/rk3568-toolchain
          
          2. 安装驱动 (Windows):
             - 安装 Rockchip USB Driver
             - 或使用 Zadig 安装驱动
          
          二、进入 Mask ROM 模式
          ---------------------
          方法1: 按住 RECOVERY 按钮，连接 USB 线
          方法2: 按住 RECOVERY + RESET 按钮
          方法3: 短接板子上的 Mask ROM 测试点
          
          三、刷机步骤
          ------------
          Linux:
            sudo ./flash.sh openwrt.img
          
          Windows:
            双击 flash.bat
          
          四、手动刷机命令
          ---------------
          # 检测设备
          rkdeveloptool ld
          
          # 下载 bootloader
          rkdeveloptool db rk356x_loader_v1.15.125.bin
          
          # 写入固件
          rkdeveloptool wl 0 openwrt.img
          
          # 重启
          rkdeveloptool rd
          
          五、分区偏移参考 (RK3568)
          -----------------------
          扇区 0-64:      未使用/保留
          扇区 64-16384:  idbloader/uboot (约 8MB)
          扇区 16384+:    boot + rootfs
          
          ===================================
          README
          
          cd rkflash
          sha256sum * > sha256sums.txt
          ls -lh
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## rkdeveloptool 刷机文件" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: 上传 rkdeveloptool 刷机文件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.DEVICE }}-rkflash-${{ github.run_number }}
          path: immortalwrt/rkflash/*
          retention-days: 7

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.DEVICE }}-${{ env.IMMORTALWRT_VERSION }}-${{ github.run_number }}
          path: immortalwrt/firmware/*
          retention-days: 7

      - name: 发布 Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.IMMORTALWRT_VERSION }}-${{ github.run_number }}
          name: ImmortalWrt ${{ env.DEVICE }} - ${{ env.IMMORTALWRT_VERSION }}
          body: |
            ## 编译信息
            - **设备型号**: ${{ env.DEVICE }}
            - **ImmortalWrt 版本**: ${{ env.IMMORTALWRT_VERSION }}
            - **编译时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            - **额外软件包**: ${{ github.event.inputs.custom_packages }}
            
            ## 固件说明
            下载后请校验 SHA256 值
          files: immortalwrt/firmware/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
