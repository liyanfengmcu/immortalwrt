# ImmortalWrt 云编译工作流
# 目标设备：9tripod_x3568-v4 (RK3568)

name: ImmortalWrt Cloud Build

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt 版本分支'
        required: true
        default: 'openwrt-23.05'
        type: choice
        options:
          - openwrt-23.05
          - main
          - openwrt-21.02
      cpu_count:
        description: '编译线程数 (默认使用全部核心)'
        required: false
        default: 'auto'
        type: string
      custom_packages:
        description: '额外安装的软件包 (空格分隔)'
        required: false
        default: 'luci-app-upnp luci-app-ttyd'
        type: string

env:
  IMMORTALWRT_VERSION: ${{ github.event.inputs.immortalwrt_version || 'openwrt-23.05' }}
  TARGET: rockchip
  SUBTARGET: armv8
  DEVICE: 9tripod_x3568-v4
  # 强制使用 Node.js 24 运行 actions (避免 Node.js 20 弃用警告)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: 初始化编译环境
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang flex g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            python3-dev python3-pyelftools python3-distutils-extra \
            ccache jq libffi-dev pkg-config

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/share/swift
          df -h

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone -b $IMMORTALWRT_VERSION --single-branch --depth=1 \
            https://github.com/immortalwrt/immortalwrt.git immortalwrt
          cd immortalwrt
          git log -1 --format="commit %h - %s (%ar)"

      - name: 更新 Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置文件
        run: |
          cd immortalwrt
          cat > .config << EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${DEVICE}=y

          # 镜像配置
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256
          CONFIG_TARGET_IMAGES_GZIP=y

          # 镜像输出格式
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_EXT4_MAXINODE=60000

          # 基础软件包
          CONFIG_PACKAGE_default-settings=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-base=y
          CONFIG_PACKAGE_luci-lib-nixio=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-material=y

          # 中文支持
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          # 常用工具
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_automount=y
          CONFIG_PACKAGE_ipv6-helper=y
          CONFIG_PACKAGE_wireless-tools=y

          # 网络工具
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y

          # 编译加速 (禁用可能导致问题的选项)
          CONFIG_DEVEL=y
          # CONFIG_CCACHE is not set

          EOF

          # 添加用户自定义软件包
          if [ -n "${{ github.event.inputs.custom_packages }}" ]; then
            for pkg in ${{ github.event.inputs.custom_packages }}; do
              echo "CONFIG_PACKAGE_${pkg}=y" >> .config
            done
          fi

      - name: 禁用问题软件包
        run: |
          cd immortalwrt
          
          # 彻底禁用 libffi 包 (编译会失败)
          # 方法1: 从 feeds 中移除包定义
          rm -rf feeds/packages/libs/libffi 2>/dev/null || true
          
          # 方法2: 在配置中显式禁用
          cat >> .config << 'EOF'
          # 强制禁用 libffi (编译会失败)
          CONFIG_PACKAGE_libffi=n
          CONFIG_LIBFFI_OPTIMIZE_SPEED=n
          EOF
          
          # 方法3: 标记包为损坏
          if [ -f "feeds/packages.index" ]; then
            sed -i 's/Priority: optional/Priority: broken/; /Package: libffi/,/@@/d' feeds/packages.index 2>/dev/null || true
          fi
          
          echo "已禁用问题包: libffi"
          grep -i "libffi" .config || echo "配置中无 libffi 依赖"

      - name: 显示完整配置
        run: |
          cd immortalwrt
          echo "=========================================="
          echo "    完整 .config 配置文件内容"
          echo "=========================================="
          cat .config
          echo ""
          echo "=========================================="
          echo "    配置统计信息"
          echo "=========================================="
          echo "总配置项数量：$(wc -l < .config)"
          echo "启用的软件包数量：$(grep -c "^CONFIG_PACKAGE.*=y" .config || echo 0)"
          echo "禁用的配置项数量：$(grep -c "^# CONFIG_" .config || echo 0)"

      - name: 下载依赖包
        run: |
          cd immortalwrt
          make defconfig
          
          # 再次确保 libffi 被禁用 (defconfig 可能会重新启用它)
          sed -i 's/CONFIG_PACKAGE_libffi=y/CONFIG_PACKAGE_libffi=n/' .config 2>/dev/null || true
          sed -i 's/CONFIG_LIBFFI_OPTIMIZE_SPEED=y/CONFIG_LIBFFI_OPTIMIZE_SPEED=n/' .config 2>/dev/null || true
          if ! grep -q "CONFIG_PACKAGE_libffi" .config; then
            echo "CONFIG_PACKAGE_libffi=n" >> .config
          fi
          
          echo "检查 libffi 配置状态:"
          grep -i "libffi" .config || echo "libffi 已完全禁用"
          
          JOBS=$(nproc)
          echo "使用 ${JOBS} 线程下载"
          make download -j${JOBS}
          echo "下载完成"

      - name: 开始编译
        id: compile
        run: |
          cd immortalwrt

          # 导出编译环境变量
          export MAKEFLAGS="-j$(nproc)"
          export V=0

          # 第一次尝试：标准编译
          echo "=== 第 1 次编译尝试 (标准模式) ==="
          if make world 2>&1 | tee compile.log; then
            echo "compile_status=success" >> $GITHUB_OUTPUT
            echo "✅ 编译成功完成"
            exit 0
          fi

          # 第一次失败，分析错误
          echo ""
          echo "::warning::第 1 次编译失败，分析错误..."
          
          # 提取失败的包
          FAILED_PKG=$(grep -oP "ERROR:.*package/[^ ]+ failed" compile.log | head -1 | sed 's/.*package\///' | sed 's/ .*//' || echo "")
          echo "检测到失败的包：${FAILED_PKG:-未知}"
          
          echo "=== 编译错误摘要 ==="
          grep -iE "error:|fatal:" compile.log | tail -30 || true

          # 第二次尝试：单线程详细日志
          echo ""
          echo "=== 第 2 次编译尝试 (单线程 V=s) ==="
          make clean 2>&1 | tail -5
          
          if make -j1 V=s 2>&1 | tee -a compile.log; then
            echo "compile_status=success_retry" >> $GITHUB_OUTPUT
            echo "✅ 第 2 次编译成功"
            exit 0
          fi

          # 第二次也失败，尝试跳过问题包
          echo ""
          echo "::warning::第 2 次编译失败，尝试跳过问题包..."
          
          if [ -n "$FAILED_PKG" ] && [ "$FAILED_PKG" != "未知" ]; then
            echo "尝试禁用问题包：$FAILED_PKG"
            echo "# CONFIG_PACKAGE_${FAILED_PKG} is not set" >> .config
            make defconfig 2>&1 | tail -3
          fi

          # 第三次尝试：跳过问题包
          echo ""
          echo "=== 第 3 次编译尝试 (跳过问题包) ==="
          make clean 2>&1 | tail -5
          
          if make -j1 V=s 2>&1 | tee -a compile.log; then
            echo "compile_status=success_skip" >> $GITHUB_OUTPUT
            echo "✅ 第 3 次编译成功 (已跳过问题包)"
            exit 0
          fi

          # 最终失败，输出详细错误
          echo ""
          echo "::error::编译最终失败"
          echo ""
          echo "=== 最后 100 行错误日志 ==="
          tail -100 compile.log
          echo ""
          echo "=== 关键错误信息 ==="
          grep -iB5 -A10 "error:" compile.log | tail -50 || true
          echo ""
          echo "=== 编译停止位置 ==="
          grep -E "make\[[0-9]+\]: \*\*\*" compile.log | tail -5 || true
          exit 1

      - name: 整理固件文件
        if: steps.compile.outputs.compile_status == 'success' || steps.compile.outputs.compile_status == 'success_retry' || steps.compile.outputs.compile_status == 'success_skip'
        run: |
          cd immortalwrt
          mkdir -p firmware

          # 复制所有镜像文件 (包括 .img.gz 和 .img)
          find bin/targets/${TARGET}/${SUBTARGET} -maxdepth 1 -type f \( -name "*.img.gz" -o -name "*.img" \) -exec cp {} firmware/ \;

          # 解压 .img.gz 文件
          cd firmware
          for img_gz in *.img.gz; do
            if [ -f "$img_gz" ]; then
              echo "解压：$img_gz"
              gunzip -f "$img_gz"
            fi
          done

          # 复制编译配置信息
          find ../bin/targets/${TARGET}/${SUBTARGET} -maxdepth 1 -type f \( -name "config.buildinfo" -o -name "version.buildinfo" \) -exec cp {} . \;

          # 生成 SHA256 校验文件
          sha256sum *.img *.buildinfo 2>/dev/null > sha256sums.txt || sha256sum * > sha256sums.txt

          echo "## 编译信息" >> $GITHUB_STEP_SUMMARY
          echo "- **设备**: ${DEVICE}" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${IMMORTALWRT_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **编译时间**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **编译结果**: ${{ steps.compile.outputs.compile_status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 固件文件列表" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 发布 Release
        if: (github.event_name == 'workflow_dispatch') && (steps.compile.outputs.compile_status == 'success' || steps.compile.outputs.compile_status == 'success_retry' || steps.compile.outputs.compile_status == 'success_skip')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.IMMORTALWRT_VERSION }}-${{ github.run_number }}
          name: ImmortalWrt ${{ env.DEVICE }} - ${{ env.IMMORTALWRT_VERSION }}
          body: |
            ## 编译信息
            - **设备型号**: ${{ env.DEVICE }}
            - **ImmortalWrt 版本**: ${{ env.IMMORTALWRT_VERSION }}
            - **工作流运行号**: ${{ github.run_number }}
            - **额外软件包**: ${{ github.event.inputs.custom_packages || '无' }}

            ## 固件说明
            1. 下载对应的 `.img` 镜像文件
            2. 校验 SHA256 值确保文件完整性
            3. 使用烧录工具写入存储设备

            ## 校验值
            \`\`\`
            ${{ github.workspace }}/immortalwrt/firmware/sha256sums.txt
            \`\`\`
          files: |
            immortalwrt/firmware/*.img
            immortalwrt/firmware/*.buildinfo
            immortalwrt/firmware/sha256sums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
