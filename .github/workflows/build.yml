# ImmortalWrt 云编译工作流
# 目标设备：9tripod_x3568-v4 (RK3568)

name: 9tripod_x3568-v4

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt 版本分支'
        required: true
        default: 'openwrt-23.05'
        type: choice
        options:
          - openwrt-23.05
          - main
          - openwrt-21.02
      custom_packages:
        description: '额外安装的软件包 (空格分隔)'
        required: false
        default: 'luci-app-upnp luci-app-ttyd'
        type: string
      skip_release:
        description: '跳过 Release 发布 (仅下载固件)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  IMMORTALWRT_VERSION: ${{ github.event.inputs.immortalwrt_version || 'openwrt-23.05' }}
  TARGET: rockchip
  SUBTARGET: armv8
  DEVICE: 9tripod_x3568-v4
  DEVICE_CONFIG: 9TRIPOD_X3568-V4
  CACHE_PREFIX: immortalwrt-${{ github.event.inputs.immortalwrt_version || 'openwrt-23.05' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: 初始化编译环境
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang flex g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            python3-dev python3-pyelftools python3-distutils-extra \
            ccache jq pkg-config
          df -h /

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell /usr/share/miniconda /usr/share/swift
          sudo docker rmi $(sudo docker images -q) 2>/dev/null || true
          sudo rm -rf /var/lib/docker 2>/dev/null || true
          df -h /

      - name: 克隆 ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ env.IMMORTALWRT_VERSION }}
          path: immortalwrt
          fetch-depth: 1

      - name: 缓存下载文件
        uses: actions/cache@v4
        with:
          path: |
            immortalwrt/dl
            immortalwrt/build_dir
          key: ${{ env.CACHE_PREFIX }}-dl-${{ hashFiles('immortalwrt/feeds/**') }}
          restore-keys: |
            ${{ env.CACHE_PREFIX }}-dl-

      - name: 更新 Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          git log -1 --format="📌 %h - %s (%ar)"

      - name: 诊断 - 显示可用的 Rockchip 设备
        run: |
          cd immortalwrt
          echo "=== 查找 Rockchip 目标配置 ==="
          find target/linux/rockchip -name "image*.mk" -exec cat {} \; 2>/dev/null | head -100
          echo ""
          echo "=== 查找设备定义文件 ==="
          find target/linux/rockchip/image -name "*.mk" 2>/dev/null
          echo ""
          echo "=== 所有可用的 SUBTARGET 设备 ==="
          grep -r "DEVICE.*:=" target/linux/rockchip/image/ 2>/dev/null | head -30

      - name: 生成配置文件
        run: |
          cd immortalwrt
          cat > .config << EOF
          # ========== 目标设备配置 ==========
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${DEVICE_CONFIG}=y

          # ========== 镜像生成配置 (关键) ==========
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_EXT4_MAXINODE=60000
          CONFIG_TARGET_ROOTFS_PARTSIZE=256

          # ========== 内核配置 ==========
          CONFIG_LINUX_5_10=y
          CONFIG_KERNEL_5_10=y
          CONFIG_TARGET_KERNEL_VERSION="5.10"

          # ========== Rockchip 驱动 ==========
          CONFIG_PACKAGE_kmod-rockchip=y
          CONFIG_PACKAGE_kmod-rk-emmc=y
          CONFIG_PACKAGE_kmod-rk-sdmmc=y
          CONFIG_PACKAGE_kmod-rk-usb=y
          CONFIG_PACKAGE_kmod-mmc=y
          
          # ========== 文件系统 ==========
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-f2fs=y
          
          # ========== 压缩库 ==========
          CONFIG_PACKAGE_kmod-lib-crc32c=y
          CONFIG_PACKAGE_kmod-lib-lzo=y
          CONFIG_PACKAGE_kmod-lib-zlib=y
          CONFIG_PACKAGE_kmod-lib-zstd=y

          # ========== 基础软件包 ==========
          CONFIG_PACKAGE_default-settings=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-base=y
          CONFIG_PACKAGE_luci-lib-nixio=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-material=y

          # 中文支持
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          # 常用工具
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_automount=y
          CONFIG_PACKAGE_ipv6-helper=y
          CONFIG_PACKAGE_wireless-tools=y

          # 网络工具
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y

          # 编译配置
          CONFIG_DEVEL=y
          CONFIG_CCACHE=n

          EOF

          # 添加用户自定义软件包
          if [ -n "${{ github.event.inputs.custom_packages }}" ]; then
            for pkg in ${{ github.event.inputs.custom_packages }}; do
              echo "CONFIG_PACKAGE_${pkg}=y" >> .config
            done
          fi

          # 显示生成的配置
          echo "=== 已生成的设备配置 ==="
          grep "CONFIG_TARGET.*DEVICE" .config
          echo ""
          echo "=== 完整的 .config 文件 ==="
          cat .config

          # 禁用已知问题包
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_libffi=n
          CONFIG_LIBFFI_OPTIMIZE_SPEED=n
          # 禁用 python3 以节省空间和编译时间
          CONFIG_PACKAGE_python3=n
          CONFIG_PACKAGE_python3-base=n
          CONFIG_PACKAGE_python3-light=n
          CONFIG_PACKAGE_python3-pip=n
          CONFIG_PACKAGE_python3-distutils=n
          EOF

      - name: 显示配置信息
        run: |
          cd immortalwrt
          echo "### 📋 配置统计" >> $GITHUB_STEP_SUMMARY
          echo "- 总配置项：$(wc -l < .config)" >> $GITHUB_STEP_SUMMARY
          echo "- 启用软件包：$(grep -c '^CONFIG_PACKAGE.*=y' .config || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- 目标设备：${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "- 分支版本：${{ env.IMMORTALWRT_VERSION }}" >> $GITHUB_STEP_SUMMARY

      - name: 编译准备
        run: |
          cd immortalwrt
          make defconfig
          JOBS=$(nproc)
          echo "📥 使用 ${JOBS} 线程下载..."
          make download -j${JOBS}
          echo "✅ 下载完成"

      - name: 开始编译
        id: compile
        continue-on-error: true
        run: |
          cd immortalwrt
          export MAKEFLAGS="-j$(nproc)"

          echo "🚀 开始编译 (预计 60-90 分钟)..."
          # 先检查配置是否正确
          make defconfig

          # 使用 V=s 进行详细输出以便调试
          if make world V=s 2>&1 | tee compile.log; then
            echo "compile_status=success" >> $GITHUB_OUTPUT
            echo "✅ 编译成功"
          else
            echo "compile_status=failed" >> $GITHUB_OUTPUT
            echo "::error::编译失败，请查看日志"
            echo "### ❌ 编译失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### 错误详情 (最后 50 行):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 compile.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### 关键错误:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -iE "error:|fatal:|make\[[0-9]+\]: \*\*\*" compile.log | tail -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 检查编译状态
        run: |
          if [ "${{ steps.compile.outputs.compile_status }}" != "success" ]; then
            echo "::error::编译失败，请查看上方日志"
            exit 1
          fi

      - name: 验证固件
        if: steps.compile.outputs.compile_status == 'success'
        run: |
          cd immortalwrt
          echo "🔍 验证编译产物..."

          # 显示完整的 bin 目录结构
          echo "=== bin 目录完整结构 ==="
          find bin -type f 2>/dev/null | head -50
          echo ""
          
          # 显示 targets 目录结构
          echo "=== bin/targets 目录结构 ==="
          ls -laR bin/targets/ 2>/dev/null | head -100 || echo "bin/targets 目录不存在或为空"
          echo ""
          
          # 检查是否有 rockchip 目录
          echo "=== 检查 rockchip 目标目录 ==="
          if [ -d "bin/targets/${TARGET}/${SUBTARGET}" ]; then
            echo "目录存在：bin/targets/${TARGET}/${SUBTARGET}"
            ls -la bin/targets/${TARGET}/${SUBTARGET}/
          else
            echo "::warning::目录不存在：bin/targets/${TARGET}/${SUBTARGET}"
            echo "尝试查找 rockchip 相关目录:"
            find bin -type d -name "*rockchip*" 2>/dev/null || echo "未找到 rockchip 目录"
            find bin -type d -name "*armv8*" 2>/dev/null || echo "未找到 armv8 目录"
          fi
          echo ""

          # 检查镜像文件是否存在 (多种可能的格式)
          echo "=== 搜索所有镜像文件 ==="
          find bin -type f \( -name "*.img" -o -name "*.img.gz" -o -name "*.img.xz" \) 2>/dev/null | head -20
          IMG_COUNT=$(find bin -type f \( -name "*.img" -o -name "*.img.gz" -o -name "*.img.xz" \) 2>/dev/null | wc -l)
          
          if [ "$IMG_COUNT" -eq 0 ]; then
            echo "::error::未找到镜像文件!"
            echo ""
            echo "=== 可能的原因 ==="
            echo "1. 设备名称 '${DEVICE}' 不正确"
            echo "2. 缺少必要的内核驱动配置"
            echo "3. 编译过程中断，未生成镜像"
            echo ""
            echo "=== 建议检查 .config 文件中的设备配置 ==="
            grep -E "CONFIG_TARGET.*${DEVICE}" .config || echo "未找到设备配置"
            exit 1
          fi
          echo "✅ 找到 ${IMG_COUNT} 个镜像文件"

          # 检查 buildinfo 文件
          find bin/targets/${TARGET}/${SUBTARGET} -type f -name "*.buildinfo" | head -5
          echo "✅ 验证通过"

      - name: 整理固件文件
        if: steps.compile.outputs.compile_status == 'success'
        run: |
          cd immortalwrt
          mkdir -p firmware

          # 复制并解压镜像 (支持多种格式和路径)
          find bin/targets/${TARGET}/${SUBTARGET} -type f \( -name "*.img.gz" -o -name "*.img.xz" -o -name "*.img" \) -exec cp {} firmware/ \;
          
          # 如果 bin/targets 没有找到，尝试从 build_dir 复制
          if [ ! "$(ls -A firmware 2>/dev/null)" ]; then
            find build_dir/target-*/image -type f \( -name "*.img.gz" -o -name "*.img.xz" -o -name "*.img" \) -exec cp {} firmware/ \;
          fi
          
          cd firmware
          # 解压 .img.gz 文件
          for img_gz in *.img.gz; do
            [ -f "$img_gz" ] && gunzip -f "$img_gz"
          done
          # 解压 .img.xz 文件
          for img_xz in *.img.xz; do
            [ -f "$img_xz" ] && unxz -f "$img_xz"
          done

          # 复制构建信息
          find ../bin/targets/${TARGET}/${SUBTARGET} -type f -name "*.buildinfo" -exec cp {} . \;

          # 生成校验和
          sha256sum *.img *.buildinfo 2>/dev/null > sha256sums.txt || sha256sum * > sha256sums.txt

          # 输出固件信息
          echo "### 📦 固件文件" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh *.img 2>/dev/null | awk '{print $9 ": " $5}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 上传固件 (Artifacts)
        if: steps.compile.outputs.compile_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ env.DEVICE }}-${{ env.IMMORTALWRT_VERSION }}
          path: |
            immortalwrt/firmware/*.img
            immortalwrt/firmware/*.buildinfo
            immortalwrt/firmware/sha256sums.txt
          retention-days: 30
          compression-level: 0

      - name: 发布 Release
        if: |
          steps.compile.outputs.compile_status == 'success' &&
          github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.IMMORTALWRT_VERSION }}-${{ github.run_number }}
          name: ImmortalWrt ${{ env.DEVICE }} - ${{ env.IMMORTALWRT_VERSION }}
          body: |
            ## 📌 编译信息
            | 项目 | 值 |
            |------|-----|
            | 设备型号 | ${{ env.DEVICE }} |
            | 固件版本 | ${{ env.IMMORTALWRT_VERSION }} |
            | 运行号 | ${{ github.run_number }} |
            | 编译时间 | $(date '+%Y-%m-%d %H:%M:%S') |
            | 额外软件包 | ${{ github.event.inputs.custom_packages || '无' }} |

            ## 📥 下载说明
            1. 下载对应的 `.img` 镜像文件
            2. 校验 SHA256 值确保文件完整性
            3. 使用烧录工具写入存储设备

            ## 🔐 SHA256 校验
            ```
            $(cat immortalwrt/firmware/sha256sums.txt)
            ```
          files: |
            immortalwrt/firmware/*.img
            immortalwrt/firmware/*.buildinfo
            immortalwrt/firmware/sha256sums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
